# 白族扎染非遗项目配置示例
# 基于大理白族扎染技艺传承的真实故事
# 用于演示§8项目配置层的结构和使用方式

project_name: "扎染年华"
subtitle: "大理白族扎染非遗传承短剧"

# 一句话前提（由§0灵魂捕手确认后填入）
story_premise: "一个不肯接班的白族少女，在奶奶的传统作坊即将消亡时，才发现自己血脉里早已刻下了扎染的纹样"

# ========== §8.1 核心原则 ==========
core_principles:
  - "以扎染技艺为核心叙事载体，技艺之美即故事之美"
  - "传承不是口号，是两代人的隔阂与和解"
  - "每一个扎染纹样都是一个未说出口的故事"
  - "现代与传统的冲突要落在具体的人身上，不在抽象的命题上"
  - "观众看完会想去了解扎染，而不是仅仅同情手艺人"

# ========== §8.2 禁止项 ==========
prohibitions:
  - "禁止将扎染技艺写成说明书式的展示"
  - "禁止把奶奶写成完美的传统守护者，她也有自己的执念和局限"
  - "禁止将现代元素（电商、直播、机械染）写成纯反派"
  - "禁止正面展示霸凌场景（村里人嘲笑老人守旧），只用侧面叙事"
  - "禁止用自杀/死亡制造情感高潮（悲剧结局需通过内心挣扎呈现）"
  - "禁止封建迷信（扎染是白族文化，不是巫术）"

# ========== §8.3 对白差异化规则 ==========
dialogue_rules:
  - "奶奶的台词要有白族口音特征（如'格'代替'是否'，语气词'给是'），但不刻意写成方言小品"
  - "少女的台词要体现城里回来的年轻人的语言习惯，但也要慢慢融入扎染村的语境"
  - "同一件事（比如'放弃扎染'），奶奶和少女在不同场景的说法必须递进或转变角度，不能重复"
  - "换人测试：遮住角色名，单看台词，必须能辨认是奶奶还是少女"
  - "禁止让奶奶说教式台词（如'扎染是我们白族的根啊'），要用具体动作和细节替代"

# ========== §8.4 侧面叙事规则 ==========
side_narration_rules:
  # 村里人闲言碎语（霸凌/羞辱类）
  - category: "村里人的闲言碎语"
    method: "他人视角+事后伤痕"
    example: "不拍村民嘲笑的场景，拍奶奶独自坐在作坊里，低头整理被弄乱的染料罐。作坊门口地上有被踩碎的蓝印花布。"

  # 少女被排挤（霸凌类）
  - category: "少女被村里人冷落"
    method: "静物暗示+他人转述"
    example: "不拍她被孤立的正面场景，拍她一个人在村口等奶奶，手里攥着一条洗褪色的围巾。远处几个妇女有说有笑地经过，没有人看她。"

  # 扎染技艺面临失传（情绪压抑类）
  - category: "传统技艺衰落的绝望感"
    method: "意象替代+空间隐喻"
    example: "不直接说'扎染要失传了'，拍奶奶独自在老作坊里，染缸空了，线轴蒙着灰，阳光透过窗棂照进来，照在墙上挂着的旧照片上——照片里全是年轻时的合影，人脸已经褪色。"

# ========== §8.5 平台合规 ==========
platform_compliance:
  target_platform: "红果短剧"  # 默认最严标准
  special_notes:
    - "红果对传统文化题材较友好，但需注意不得将宗教元素混入白族文化展示"
    - "扎染涉及植物染料（板蓝根等），不得暗示为迷信成分"
    - "如涉及白族三道茶等民俗，需确保无宗教含义"

# ========== §8.6 素材约束 ==========
material_constraints:
  # 素材来源优先级
  source_priority:
    - level: 1
      source: "田野调查"
      description: "大理周城白族扎染非遗传承人采访（优先）"
    - level: 2
      source: "文献研究"
      description: "《白族扎染技艺》《周城扎染志》等地方志书记载"
    - level: 3
      source: "新闻报道"
      description: "关于白族扎染非遗传承的新闻报道（真实案例改编）"
    - level: 4
      source: "虚构"
      description: "角色关系和具体情节可虚构，但扎染技艺细节必须真实"

  # 真实度要求
  authenticity_requirement: "高"
  authenticity_notes:
    - "扎染的具体工序（刻版、扎结、浸染、拆线、漂洗、晾晒）必须符合实际流程"
    - "白族扎染的典型纹样（风花雪月、牡丹、蝴蝶、鱼纹）必须准确"
    - "染料来源（板蓝根发酵蓝靛）必须准确，不得写成化学染料"
    - "扎染作坊的空间布局（染缸位置、晾晒架、刻版桌）要有真实的质感"

  # 特殊素材偏好
  special_material_preference:
    - "优先使用真实的白族扎染技艺细节"
    - "优先使用真实的大理周城村的空间质感"
    - "优先使用真实的非遗传承困境的案例（如有真实故事）"

# ========== §8.7 类型专项规则（悲剧+非遗） ==========
type_specific_rules:
  drama_type: "悲剧+非遗文化"

  # 悲剧专项
  tragedy_rules:
    - "全剧情感基调是悲剧：传承困境×代际隔阂×自我认同"
    - "使用下沉阶梯节奏：少女从'逃离'到'被动面对'到'主动承担但已无力回天'"
    - "微光碾碎节点：奶奶曾经偷偷为少女做了一件扎染衣服（微光）→ 少女发现时衣服已被邻居小孩弄坏（碾碎）"
    - "对照叙事：曾经奶奶和少女一起浸染（童年高光）vs 如今作坊只剩奶奶一人"
    - "结局不能是大团圆：作坊可能关了，但奶奶的技艺通过另一种方式延续了（精神传承，非物质传承）"

  # 非遗专项
  intangible_culture_rules:
    - "扎染技艺是主角，不是背景：每一道工序都要有叙事功能"
    - "纹样隐喻叙事：不同的扎染纹样暗示人物命运（如'鱼纹'代表'年年有余'但少女最终离开）"
    - "技艺展示场景要配合情绪节奏：绝望时拍蒙尘的染缸，希望时拍阳光下晾晒的蓝印花布"
    - "非遗传承困境不卖惨：通过具体的人的选择来呈现，不是抽象的社会批判"
    - "邀请非遗传承人做技术顾问（真实项目建议）"

  # 弧光追踪（悲剧弧光5阶段）
  arc_tracking:
    protagonist_arc:
      - stage: "固守"
        episodes: "1-5"
        belief: "我不要像奶奶一样被困在村子里"
        action: "少女在城里实习，想逃离周城"
      - stage: "裂缝"
        episodes: "6-10"
        belief: "奶奶的作坊要关了，我不得不回去"
        action: "被迫回村，对扎染仍有抵触"
      - stage: "动摇"
        episodes: "11-18"
        belief: "扎染也许没有那么讨厌……但我真的能学会吗"
        action: "开始接触扎染，内心矛盾"
      - stage: "接受"
        episodes: "19-25"
        belief: "我爱扎染，但我救不了它"
        action: "拼命学技艺，发现现实残酷"
      - stage: "沉默"
        episodes: "26-30"
        belief: "算了，但扎染在我心里了"
        action: "作坊关了，但少女带着扎染的记忆离开"

# ========== 额外元数据 ==========
metadata:
  created_by: "drama-engine"
  version: "1.0"
  based_on: "《精品短剧创作引擎_通用版.md》§8特别约束"
  notes:
    - "本配置为白族扎染非遗项目示例，可直接替换为其他项目"
    - "使用时将以上内容填入§8项目配置师输出"
    - "素材约束中的田野调查建议在正式创作前完成"